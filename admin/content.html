<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager | Deoksi Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    /* =============================================
       REDESIGNED CONTENT MANAGER — PREMIUM CMS UI
       ============================================= */

    /* ---------- PAGE HEADER ---------- */
    .cms-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 8px;
    }
    .cms-page-header-text h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
    }
    .cms-page-header-text p {
      color: var(--admin-text-muted);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .cms-view-site-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--admin-primary), #e67e22);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      white-space: nowrap;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(247, 144, 62, 0.35);
      transition: all 0.25s ease;
      font-family: var(--admin-font);
    }
    .cms-view-site-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247, 144, 62, 0.45);
    }
    .cms-view-site-btn svg {
      flex-shrink: 0;
    }

    /* ---------- HORIZONTAL TAB NAV ---------- */
    .cms-tabs-wrapper {
      margin-bottom: 12px;
      position: relative;
    }
    .cms-tabs-scroll {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--admin-surface);
      border: 1px solid var(--admin-border);
      border-radius: 12px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .cms-tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--admin-text-muted);
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.22s ease;
      white-space: nowrap;
      font-family: var(--admin-font);
    }
    .cms-tab-btn:hover {
      background: var(--admin-surface-2);
      color: var(--admin-text);
    }
    .cms-tab-btn.is-active {
      background: var(--admin-primary-soft);
      color: var(--admin-primary);
      border-color: rgba(247, 144, 62, 0.22);
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(247, 144, 62, 0.1);
    }
    .cms-tab-icon {
      font-size: 1.1em;
    }

    /* ---------- SECTION HEADER (per page) ---------- */
    .cms-section-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--admin-border);
    }
    .cms-section-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 2px;
      color: var(--admin-text);
    }
    .cms-section-desc {
      color: var(--admin-text-muted);
      font-size: 0.8rem;
      line-height: 1.4;
      max-width: 600px;
    }
    .cms-section-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .cms-section-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--admin-surface-2);
      border: 1px solid var(--admin-border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--admin-text-muted);
    }

    /* ---------- GUIDANCE TEXT ---------- */
    .cms-guidance {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(247, 144, 62, 0.06);
      border: 1px solid rgba(247, 144, 62, 0.12);
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #d4956a;
    }
    .cms-guidance-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* ---------- SECTION CARDS GRID ---------- */
    .cms-grid {
      display: grid;
      gap: 12px;
    }
    .cms-grid--hero {
      grid-template-columns: 1fr;
      margin-bottom: 8px;
    }
    .cms-grid--sections {
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 1200px) {
      .cms-grid--sections { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 800px) {
      .cms-grid--sections { grid-template-columns: 1fr; }
    }

    /* ---------- SECTION CARD ---------- */
    .section-card {
      background: var(--admin-surface);
      border: 1px solid var(--admin-border);
      border-radius: 14px;
      padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: row;
      overflow: hidden;
      transition: all 0.25s ease;
      min-height: 140px;
    }
    .section-card:hover {
      border-color: rgba(247, 144, 62, 0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      transform: translateY(-2px);
    }
    .section-card--hero {
      border-color: rgba(247, 144, 62, 0.15);
      background: linear-gradient(135deg, var(--admin-surface), rgba(247, 144, 62, 0.04));
    }
    .section-card--hero:hover {
      border-color: rgba(247, 144, 62, 0.35);
    }

    /* Card Preview Image */
    .section-card-preview {
      position: relative;
      width: 110px;
      height: auto;
      background: var(--admin-surface-2);
      overflow: hidden;
      flex-shrink: 0;
      border-right: 1px solid var(--admin-border);
    }
    .section-card--hero .section-card-preview {
      width: 160px;
      height: auto;
    }
    .section-card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s, transform 0.4s;
    }
    .section-card:hover .section-card-preview img {
      opacity: 1;
      transform: scale(1.03);
    }
    .section-card-preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      opacity: 0.25;
      background: linear-gradient(135deg, var(--admin-surface-2), rgba(247,144,62,0.05));
    }
    .section-card--hero .section-card-preview-placeholder {
      font-size: 3.5rem;
    }

    /* Card Body */
    .section-card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: center;
    }
    .section-card--hero .section-card-body {
      padding: 16px 20px;
    }

    /* Card Top Row: Title + Badge */
    .section-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .section-card-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-card-name-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .section-card-name h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--admin-text);
      margin: 0;
    }
    .section-card--hero .section-card-name h3 {
      font-size: 1.1rem;
    }

    /* Badge */
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .section-badge--active {
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
    }
    .section-badge--active::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: badgePulse 2s ease infinite;
    }
    .section-badge--list {
      background: rgba(59, 130, 246, 0.12);
      color: #60a5fa;
    }
    .section-badge--draft {
      background: rgba(234, 179, 8, 0.12);
      color: #eab308;
    }

    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Description */
    .section-card-desc {
      font-size: 0.78rem;
      color: var(--admin-text-muted);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Preview Snippet */
    .section-card-snippet {
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--admin-surface-2);
      border: 1px solid var(--admin-border);
      margin-bottom: 10px;
    }
    .section-card-snippet-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--admin-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }
    .section-card-snippet-value {
      font-size: 0.78rem;
      color: var(--admin-text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .section-card-snippet-value.is-empty {
      color: var(--admin-text-muted);
      font-style: italic;
      opacity: 0.6;
    }

    /* Info strip */
    .section-card-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      color: var(--admin-text-muted);
      margin-bottom: 12px;
    }
    .section-card-info-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* CTA Button */
    .section-card-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 8px 16px;
      border-radius: 10px;
      background: var(--admin-primary);
      color: #fff;
      border: none;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--admin-font);
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(247, 144, 62, 0.2);
    }
    .section-card-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(247, 144, 62, 0.35);
      opacity: 0.95;
    }
    .section-card-cta:active {
      transform: translateY(0);
    }
    .section-card--hero .section-card-cta {
      padding: 10px 20px;
      font-size: 0.88rem;
    }
    .section-card-cta svg {
      flex-shrink: 0;
    }

    /* ---------- LOADING OVERLAY ---------- */
    .cms-loading-overlay {
      display: none;
      padding: 40px;
      text-align: center;
    }
    .cms-loading-overlay.is-visible {
      display: block;
    }
    .cms-loading-spinner {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 16px;
      background: var(--admin-surface);
      border: 1px solid var(--admin-border);
      color: var(--admin-text-muted);
      font-size: 0.9rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .cms-loading-spinner::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(247, 144, 62, 0.25);
      border-top-color: var(--admin-primary);
      animation: admin-spin 0.75s linear infinite;
    }

    /* ---------- CONTENT FORM STYLES (Modal) ---------- */
    .content-form {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .content-field {
      display: grid;
      gap: 8px;
    }
    .content-field--full {
      grid-column: 1 / -1;
    }
    .content-field label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--admin-text);
    }
    .content-input,
    .content-textarea,
    .content-select {
      width: 100%;
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      background: var(--admin-surface-2);
      color: var(--admin-text);
      padding: 8px 12px;
      font-size: 0.88rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .content-input:focus,
    .content-textarea:focus,
    .content-select:focus {
      outline: none;
      border-color: var(--admin-primary);
      box-shadow: 0 0 0 4px rgba(247, 144, 62, 0.12);
    }
    .content-textarea {
      min-height: 80px;
      resize: vertical;
    }

    /* ---------- MODAL ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.is-open {
      display: flex;
    }
    .modal-container {
      background: var(--admin-surface);
      width: 100%;
      max-width: 1100px;
      max-height: 90vh;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      animation: modalSlideIn 0.3s ease-out;
      border: 1px solid var(--admin-border);
    }
    @keyframes modalSlideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--admin-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-size: 1.25rem;
      font-weight: 800;
    }
    .modal-close {
      background: var(--admin-surface-2);
      border: 1px solid var(--admin-border);
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--admin-text-muted);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: var(--admin-surface);
      color: var(--admin-text);
    }
    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex-grow: 1;
    }
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--admin-border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: var(--admin-surface-2);
      border-radius: 0 0 18px 18px;
    }

    /* ---------- ARRAY ITEMS ---------- */
    .array-item {
      background: var(--admin-surface-2);
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .array-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .array-item-title {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--admin-text);
    }
    .array-item-actions {
      display: flex;
      gap: 6px;
    }
    .btn-icon {
      background: var(--admin-surface);
      border: 1px solid var(--admin-border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: var(--admin-primary-soft);
    }
    .btn-icon.danger:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 768px) {
      .cms-page-header {
        flex-direction: column;
      }
      .cms-section-header {
        flex-direction: column;
      }
      .cms-grid--sections {
        grid-template-columns: 1fr;
      }
      .content-form {
        grid-template-columns: 1fr;
      }
      .content-field--full {
        grid-column: 1;
      }
      .modal-container {
        max-width: 100%;
        border-radius: 18px;
      }
      .modal-header,
      .modal-body,
      .modal-footer {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <main class="admin-main">

      <!-- Page Header -->
      <div class="cms-page-header">
        <div class="cms-page-header-text">
          <h1>Kelola Website</h1>
          <p>Pilih halaman lalu edit bagian konten yang Anda inginkan.</p>
        </div>
        <a href="/" target="_blank" class="cms-view-site-btn" id="view-site-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Lihat Website
        </a>
      </div>

      <!-- Horizontal Tabs -->
      <div class="cms-tabs-wrapper">
        <div class="cms-tabs-scroll" id="tabs-nav">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Section Header (per page) -->
      <div class="cms-section-header" id="section-header">
        <div>
          <div class="cms-section-title" id="page-title-display">Memuat...</div>
          <div class="cms-section-desc" id="page-desc-display">Silakan tunggu sebentar.</div>
        </div>
        <div class="cms-section-meta">
          <div class="cms-section-count" id="section-count">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span id="section-count-text">– section</span>
          </div>
        </div>
      </div>

      <!-- Guidance Text -->
      <div class="cms-guidance">
        <span class="cms-guidance-icon">💡</span>
        Pilih bagian yang ingin Anda ubah, lalu klik tombol edit di bawahnya.
      </div>

      <!-- Loading -->
      <div class="cms-loading-overlay is-visible" id="content-loading-mask">
        <div class="cms-loading-spinner">Memuat data...</div>
      </div>

      <!-- Hero Section (full width) -->
      <div class="cms-grid cms-grid--hero" id="hero-grid">
        <!-- Hero section card injected here -->
      </div>

      <!-- Other Sections (2 column) -->
      <div class="cms-grid cms-grid--sections" id="sections-grid">
        <!-- Section cards injected here -->
      </div>

    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Edit Section</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Form injected here -->
      </div>
      <div class="modal-footer">
        <div class="content-status" id="modal-status" style="margin: 0 auto 0 0; display:flex; align-items:center;"></div>
        <button type="button" class="btn-admin btn-admin--secondary" id="modal-cancel">Batal</button>
        <button type="button" class="btn-admin btn-admin--primary" id="modal-save">Simpan Perubahan</button>
      </div>
    </div>
  </div>

  <script type="module" src="/admin/js/admin.js"></script>
  <script type="module" src="/admin/js/content-manager.js"></script>
</body>
</html>
