services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoksi-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      STATIC_ROOT: /app/dist
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PASSWORD_SALT: ${PASSWORD_SALT:?PASSWORD_SALT is required}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-deoksi/uploads}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/system-status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: deoksi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deoksi}
      POSTGRES_USER: ${POSTGRES_USER:-deoksi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - deoksi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deoksi} -d ${POSTGRES_DB:-deoksi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deoksi-redis
    volumes:
      - deoksi-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  db-init:
    profiles: ["init"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: deoksi-db-init
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://deoksi:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-deoksi}}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PASSWORD_SALT: ${PASSWORD_SALT:?PASSWORD_SALT is required}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "api/_lib/setup-db.mjs"]

volumes:
  deoksi-postgres-data:
  deoksi-redis-data:
