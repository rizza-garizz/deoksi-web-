services:
  web-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: deoksi-web-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
